<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password | HWPlanner</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://horizon-wiring.co.uk">
    <link rel="stylesheet" href="styles.css">
    <script src="auth.js" defer></script>
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="reset-title">
        <a class="brand auth-brand" href="/login.html" aria-label="HWPlanner login">
          <img
            class="brand-logo brand-logo-white"
            src="https://horizon-wiring.co.uk/wp-content/themes/es-template/dist/images/Logo-White.ef0dd9d122b5d81fa8b78d5b9a4e5ef3.svg"
            alt="Horizon Wiring"
          >
          <span class="brand-tag">Planner</span>
        </a>

        <div class="auth-card">
          <p class="eyebrow">Password reset</p>
          <h1 id="reset-title">Choose a new password.</h1>
          <p class="auth-copy">
            Reset links expire after one hour. Passwords must be at least 10
            characters long.
          </p>

          <form class="auth-form" id="reset-form">
            <label for="reset-password">New password</label>
            <input
              id="reset-password"
              name="password"
              type="password"
              autocomplete="new-password"
              minlength="10"
              required
            >

            <label for="reset-confirm-password">Confirm password</label>
            <input
              id="reset-confirm-password"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="10"
              required
            >

            <button class="button button-primary" type="submit">Update password</button>
            <p class="form-message" id="reset-message" role="status"></p>
          </form>

          <a class="auth-link" href="/login.html">Back to sign in</a>
        </div>
      </section>
    </main>
  </body>
</html>
